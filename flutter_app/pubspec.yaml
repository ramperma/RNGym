name: gym_trainer_app
description: Gym Trainer personal app
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4
  http: ^1.2.1
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.2.4
  animations: ^2.2.0
  shimmer: ^3.0.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/