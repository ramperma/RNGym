# ==============================================================================
# EJEMPLO DE CONFIGURACIÓN DE APACHE PARA VIRTUALMIN (Proxy Inverso)
# Dominio: rngym.duckdns.org
# Puerto: 8443
# Rutas:
#   /api/*       -> Backend FastAPI (127.0.0.1:8002)
#   /admin/*     -> Streamlit Admin (127.0.0.1:8501)
#   /            -> Flutter Web (Archivos estáticos)
# ==============================================================================

<VirtualHost *:8443>
    ServerName rngym.duckdns.org
    DocumentRoot /var/www/html/rngym/flutter_app/build/web

    # Habilitar SSL (Las rutas dependen de Virtualmin, generalmente ya las configura)
    SSLEngine on
    SSLCertificateFile /home/USUARIO_VIRTUALMIN/ssl.cert
    SSLCertificateKeyFile /home/USUARIO_VIRTUALMIN/ssl.key

    # Módulos necesarios en Apache: proxy, proxy_http, proxy_wstunnel, rewrite, headers

    # --- RUTAS DEL PANEL DE ADMINISTRACIÓN (STREAMLIT) ---
    # Streamlit usa WebSockets, necesitamos configurarlos correctamente
    # Redirigimos /admin a /admin/ para evitar problemas de rutas
    RedirectMatch ^/admin$ /admin/
    
    <Location /admin/>
        ProxyPass http://127.0.0.1:8501/
        ProxyPassReverse http://127.0.0.1:8501/
    </Location>
    
    # Websockets de Streamlit
    <Location /admin/_stcore/stream>
        ProxyPass ws://127.0.0.1:8501/_stcore/stream
        ProxyPassReverse ws://127.0.0.1:8501/_stcore/stream
    </Location>

    # --- RUTAS DEL BACKEND (FASTAPI) ---
    <Location /api/>
        ProxyPass http://127.0.0.1:8002/api/
        ProxyPassReverse http://127.0.0.1:8002/api/
    </Location>

    # Configuración para servir archivos estáticos de Flutter
    <Directory /var/www/html/rngym/flutter_app/build/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Redirigir el enrutamiento frontend a index.html (SPA)
        RewriteEngine on
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rngym_error.log
    CustomLog ${APACHE_LOG_DIR}/rngym_access.log combined
</VirtualHost>
